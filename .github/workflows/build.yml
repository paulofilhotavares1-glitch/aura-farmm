- name: Reescrever build.gradle com assinatura
        run: |
          cat > android/app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'

          android {
              namespace "com.aurafarm.game1"
              compileSdkVersion 35
              defaultConfig {
                  applicationId "com.aurafarm.game1"
                  minSdkVersion 22
                  targetSdkVersion 35
                  versionCode 5
                  versionName "1.0"
              }
              signingConfigs {
                  release {
                      storeFile file("aurafarm.keystore")
                      storePassword "Aurafarm2024"
                      keyAlias "aurafarm"
                      keyPassword "Aurafarm2024"
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
          }

          repositories {
              google()
              mavenCentral()
          }

          dependencies {
              implementation fileTree(include: ['*.jar'], dir: 'libs')
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation project(':capacitor-android')
          }
          EOF
