name: Compilar AAB - Aura Farm

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Organizar pasta www
        run: |
          mkdir -p www
          if [ -f index.html ]; then mv index.html www/index.html; fi

      - name: Instalar dependências
        run: npm install

      - name: Atualizar ID do pacote
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.aurafarm.jogo",
            "appName": "Aura Farm",
            "webDir": "www"
          }
          EOF

      - name: Adicionar plataforma Android
        run: npx cap add android

      - name: Adicionar ID do AdMob
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|</application>|    <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-3479791414145941~7859552560"/>\n    </application>|' $MANIFEST

      - name: Corrigir SDK no variables.gradle
        run: |
          echo "=== variables.gradle ==="
          cat android/variables.gradle
          perl -i -pe 's/compileSdkVersion\s*=\s*\d+/compileSdkVersion = 35/g' android/variables.gradle
          perl -i -pe 's/targetSdkVersion\s*=\s*\d+/targetSdkVersion = 35/g' android/variables.gradle
          perl -i -pe 's/minSdkVersion\s*=\s*\d+/minSdkVersion = 22/g' android/variables.gradle
          perl -i -pe 's/versionCode\s*=\s*\d+/versionCode = 14/g' android/variables.gradle
          perl -i -pe 's/versionCode\s+\d+/versionCode 14/g' android/app/build.gradle
          echo "=== APÓS CORREÇÃO ==="
          cat android/variables.gradle

      - name: Sincronizar arquivos do jogo
        run: npx cap sync android

      - name: Compilar AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Restaurar keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > aurafarm.keystore

      - name: Assinar AAB
        run: |
          SENHAS=("aurafarm2024" "Aurafarm2024" "Aurafarm@2024" "aurafarm@2024")
          ALIAS_LIST=("aurafarm" "key0" "release")
          AAB="android/app/build/outputs/bundle/release/app-release.aab"
          SIGNED="android/app/build/outputs/bundle/release/app-release-signed.aab"
          for ALIAS in "${ALIAS_LIST[@]}"; do
            for SENHA in "${SENHAS[@]}"; do
              if jarsigner \
                -keystore aurafarm.keystore \
                -storepass "$SENHA" \
                -keypass "$SENHA" \
                -signedjar "$SIGNED" \
                "$AAB" \
                "$ALIAS" 2>/dev/null; then
                echo "✅ alias=$ALIAS senha=$SENHA"
                exit 0
              fi
            done
          done
          exit 1

      - name: Salvar AAB assinado
        uses: actions/upload-artifact@v4
        with:
          name: aura-farm-release
          path: android/app/build/outputs/bundle/release/app-release-signed.aab
          retention-days: 30
