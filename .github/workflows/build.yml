name: Compilar APK - Aura Farm

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Organizar pasta www
        run: |
          mkdir -p www
          if [ -f index.html ]; then mv index.html www/index.html; fi

      - name: Instalar dependências
        run: npm install

      - name: Atualizar ID do pacote
        run: |
          sed -i 's/com.aurafarm.game/com.aurafarm.game1/g' capacitor.config.json

      - name: Adicionar plataforma Android
        run: npx cap add android

      - name: Corrigir SDK e versão
        run: |
          sed -i 's/targetSdkVersion 34/targetSdkVersion 35/g' android/app/build.gradle
          sed -i 's/compileSdkVersion 34/compileSdkVersion 35/g' android/app/build.gradle
          sed -i 's/targetSdk = 34/targetSdk = 35/g' android/app/build.gradle
          sed -i 's/compileSdk = 34/compileSdk = 35/g' android/app/build.gradle
          sed -i 's/versionCode 1/versionCode 5/g' android/app/build.gradle

      - name: Adicionar ID do AdMob
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|</application>| <meta-data\n android:name="com.google.android.gms.ads.APPLICATION_ID"\n android:value="ca-app-pub-3479791414145941~7859552560"/>\n </application>|' $MANIFEST

      - name: Decodificar Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/aurafarm.keystore

      - name: Sincronizar arquivos do jogo
        run: npx cap sync android

      - name: Configurar assinatura no build.gradle
        run: |
          cat >> android/app/build.gradle << EOF

          android {
              signingConfigs {
                  release {
                      storeFile file("aurafarm.keystore")
                      storePassword "Aurafarm2024"
                      keyAlias "aurafarm"
                      keyPassword "Aurafarm2024"
                  }
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF

      - name: Compilar AAB assinado
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Salvar AAB
        uses: actions/upload-artifact@v4
        with:
          name: aura-farm-release
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
