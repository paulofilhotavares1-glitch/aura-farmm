name: Compilar APK - Aura Farm

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Organizar pasta www
        run: |
          mkdir -p www
          if [ -f index.html ]; then mv index.html www/index.html; fi

      - name: Instalar dependências
        run: npm install

      - name: Adicionar plataforma Android
        run: npx cap add android

      - name: Adicionar ID do AdMob no AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|</application>|    <meta-data\n            android:name="com.google.android.gms.ads.APPLICATION_ID"\n            android:value="ca-app-pub-3479791414145941~7859552560"/>\n    </application>|' $MANIFEST

      - name: Sincronizar arquivos do jogo
        run: npx cap sync android

      - name: Gerar keystore de assinatura
        run: |
          keytool -genkey -v \
            -keystore aura-farm.keystore \
            -alias aurafarm \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass aurafarm2024 \
            -keypass aurafarm2024 \
            -dname "CN=Aura Farm, OU=Games, O=AuraFarm, L=Brasil, S=CE, C=BR"

      - name: Compilar AAB assinado (Play Store)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon
        env:
          KEYSTORE_PATH: ../aura-farm.keystore
          KEY_ALIAS: aurafarm
          KEY_PASSWORD: aurafarm2024
          STORE_PASSWORD: aurafarm2024

      - name: Assinar o AAB
        run: |
          jarsigner -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore aura-farm.keystore \
            -storepass aurafarm2024 \
            -keypass aurafarm2024 \
            android/app/build/outputs/bundle/release/app-release.aab \
            aurafarm

      - name: Salvar AAB assinado para download
        uses: actions/upload-artifact@v4
        with:
          name: aura-farm-release
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Salvar Keystore (GUARDE COM SEGURANÇA!)
        uses: actions/upload-artifact@v4
        with:
          name: aura-farm-keystore
          path: aura-farm.keystore
          retention-days: 30
