name: Compilar AAB - Aura Farm

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Organizar pasta www
        run: |
          mkdir -p www
          if [ -f index.html ]; then mv index.html www/index.html; fi

      - name: Instalar dependências
        run: npm install

      - name: Atualizar ID do pacote
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.aurafarm.game1",
            "appName": "Aura Farm",
            "webDir": "www"
          }
          EOF

      - name: Adicionar plataforma Android
        run: npx cap add android

      - name: Adicionar ID do AdMob
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|</application>|    <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-3479791414145941~7859552560"/>\n    </application>|' $MANIFEST

      - name: Sincronizar arquivos do jogo
        run: npx cap sync android

      - name: Restaurar keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/aurafarm.keystore

      - name: Reescrever build.gradle com assinatura
        run: |
          cat > android/app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'

          android {
              namespace "com.aurafarm.game1"
              compileSdkVersion 35
              defaultConfig {
                  applicationId "com.aurafarm.game1"
                  minSdkVersion 22
                  targetSdkVersion 35
                  versionCode 5
                  versionName "1.0"
              }
              signingConfigs {
                  release {
                      storeFile file("aurafarm.keystore")
                      storePassword "Aurafarm2024"
                      keyAlias "aurafarm"
                      keyPassword "Aurafarm2024"
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
          }

          repositories {
              google()
              mavenCentral()
          }

          dependencies {
              implementation fileTree(include: ['*.jar'], dir: 'libs')
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation project(':capacitor-android')
          }
          EOF

      - name: Compilar AAB assinado
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Salvar AAB
        uses: actions/upload-artifact@v4
        with:
          name: aura-farm-release
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
