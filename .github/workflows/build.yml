name: Compilar AAB - Aura Farm

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Organizar pasta www
        run: |
          mkdir -p www
          if [ -f index.html ]; then mv index.html www/index.html; fi

      - name: Instalar dependências
        run: npm install

      - name: Atualizar ID do pacote
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.aurafarm.jogo",
            "appName": "Aura Farm",
            "webDir": "www"
          }
          EOF

      - name: Adicionar plataforma Android
        run: npx cap add android

      - name: Adicionar ID do AdMob
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|</application>|    <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-3479791414145941~7859552560"/>\n    </application>|' $MANIFEST

      - name: Corrigir SDK
        run: |
          sed -i 's/compileSdkVersion 34/compileSdkVersion 35/g' android/app/build.gradle
          sed -i 's/targetSdkVersion 34/targetSdkVersion 35/g' android/app/build.gradle
          sed -i 's/compileSdk = 34/compileSdk = 35/g' android/app/build.gradle
          sed -i 's/targetSdk = 34/targetSdk = 35/g' android/app/build.gradle
          sed -i 's/versionCode 1/versionCode 1/g' android/app/build.gradle

      - name: Sincronizar arquivos do jogo
        run: npx cap sync android

      - name: Compilar AAB não assinado
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Restaurar keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > aurafarm.keystore

      - name: Assinar AAB
        run: |
          jarsigner \
            -keystore aurafarm.keystore \
            -storepass Aurafarm2024 \
            -keypass Aurafarm2024 \
            -signedjar android/app/build/outputs/bundle/release/app-release-signed.aab \
            android/app/build/outputs/bundle/release/app-release.aab \
            aurafarm

      - name: Salvar AAB assinado
        uses: actions/upload-artifact@v4
        with:
          name: aura-farm-release
          path: android/app/build/outputs/bundle/release/app-release-signed.aab
          retention-days: 30
